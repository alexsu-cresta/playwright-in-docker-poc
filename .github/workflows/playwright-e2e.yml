name: Playwright E2E

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  checks: write

jobs:
  playwright-e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Playwright tests (Docker Compose)
        run: docker compose run --rm playwright

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-failure-artifacts
          path: |
            playwright-report/
            test-results/
          retention-days: 3
          if-no-files-found: ignore
